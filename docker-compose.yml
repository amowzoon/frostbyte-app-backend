# Base compose file.
# Included by frostbyte-backend's docker-compose.yml in production.
# For standalone dev, layer docker-compose.dev.yml on top.

services:
  server:
    build: ./server
    container_name: frostbyte-server
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app
    environment:
      - POSTGRES_DSN=postgresql://frostbyte:${POSTGRES_PASSWORD}@postgres:5432/frostbyte
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SHARED_REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - PRIVATE_REDIS_URL=redis://mobile-redis:6379
    depends_on:
      - postgres
      - mobile-redis
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: frostbyte-postgres
    environment:
      - POSTGRES_USER=frostbyte
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=frostbyte
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  mobile-redis:
    image: redis:7-alpine
    container_name: mobile-redis
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    restart: unless-stopped

volumes:
  postgres-data: