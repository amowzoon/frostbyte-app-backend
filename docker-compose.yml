version: "3.8"

services:
  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Web console
    environment:
      - MINIO_ROOT_USER=frosty
      - MINIO_ROOT_PASSWORD=fr0stbyte
    volumes:
      - ./minio-data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=frosty
      - POSTGRES_PASSWORD=fr0stbyte
      - POSTGRES_DB=frostbyte
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  server:
    build: ./server
    container_name: frostbyte-server
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app
    environment:
      - SUPABASE_JWT_SECRET=e741d522-db04-41bb-b5c4-4456aba4ee4d
      - SUPABASE_URL=https://izmvxaayfqiznokbpfif.supabase.co
      - SUPABASE_SERVICE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml6bXZ4YWF5ZnFpem5va2JwZmlmIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NDgwMjE4NiwiZXhwIjoyMDkwMzc4MTg2fQ.8F2SRLo0FHbnZtsmAz7dTYlkcOdwjZ5bggSBtgHDubk
    depends_on:
      - minio
      - postgres
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - server