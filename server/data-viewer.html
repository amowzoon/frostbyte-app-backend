<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frostbyte · Data Viewer</title>
  <style>
    :root {
      --bg-base:#12121e;--bg-panel:#1a1a28;--bg-hdr:#21213a;--bg-hover:#22223a;
      --bg-selected:#1a2a48;--bg-input:#14141f;--border:#2e2e48;--border-lt:#252540;
      --text-pri:#c4c4dc;--text-sec:#6868a0;--text-dim:#40406a;
      --mono:'JetBrains Mono','Fira Code','Cascadia Code','Courier New',monospace;
      --accent:#4d7fff;--accent-h:#6090ff;--green:#3dba7a;--green-bg:#0a2018;
      --yellow:#e8a838;--yellow-bg:#1e1600;--red:#e85858;--red-bg:#200a0a;
      --purple:#a070e0;--purple-bg:#160a28;--nav-h:44px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg-base);color:var(--text-pri);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:13px;height:100vh;overflow:hidden;display:flex;flex-direction:column}
    nav{height:var(--nav-h);background:var(--bg-hdr);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:20px;flex-shrink:0}
    .nav-brand{font-family:var(--mono);font-size:13px;font-weight:700;letter-spacing:.1em;color:var(--accent);text-transform:uppercase;white-space:nowrap}
    .nav-div{width:1px;height:18px;background:var(--border)}
    .nav-links{display:flex;gap:2px}
    .nav-link{padding:5px 12px;border-radius:3px;text-decoration:none;color:var(--text-sec);font-size:12px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;transition:background .1s,color .1s}
    .nav-link:hover{background:var(--bg-hover);color:var(--text-pri)}
    .nav-link.active{background:var(--bg-selected);color:var(--accent)}
    .nav-right{margin-left:auto;display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:11px;color:var(--text-sec)}
    .filter-bar{height:40px;background:var(--bg-hdr);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0}
    .filter-bar input,.filter-bar select{background:var(--bg-input);border:1px solid var(--border);border-radius:3px;color:var(--text-pri);padding:4px 10px;font-size:12px;font-family:var(--mono);outline:none;appearance:none;height:26px}
    .filter-bar input{width:200px}
    .filter-bar input::placeholder{color:var(--text-dim)}
    .filter-bar input:focus,.filter-bar select:focus{border-color:var(--accent)}
    .filter-sep{width:1px;height:18px;background:var(--border)}
    .count-lbl{font-family:var(--mono);font-size:11px;color:var(--text-sec);margin-left:auto}
    .btn-sm{padding:4px 12px;background:transparent;border:1px solid var(--border);border-radius:3px;color:var(--text-sec);font-size:11px;font-family:var(--mono);cursor:pointer;height:26px;transition:border-color .1s,color .1s}
    .btn-sm:hover{border-color:var(--accent);color:var(--accent)}
    .split{display:flex;flex:1;overflow:hidden}
    .table-pane{width:42%;min-width:320px;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
    .table-scroll{flex:1;overflow-y:auto}
    table{width:100%;border-collapse:collapse}
    thead{position:sticky;top:0;z-index:1;background:var(--bg-hdr)}
    th{padding:8px 10px;text-align:left;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap;user-select:none}
    th:hover{color:var(--text-sec)}
    th.sort-asc::after{content:' ↑';color:var(--accent)}
    th.sort-desc::after{content:' ↓';color:var(--accent)}
    td{padding:7px 10px;border-bottom:1px solid var(--border-lt);vertical-align:middle;font-size:12px}
    tr:hover td{background:var(--bg-hover);cursor:pointer}
    tr.selected td{background:var(--bg-selected)}
    .td-id{font-family:var(--mono);font-size:11px;color:var(--text-sec);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .td-device{font-family:var(--mono);font-size:11px}
    .td-time{font-family:var(--mono);font-size:11px;color:var(--text-sec);white-space:nowrap}
    .sensor-dots{display:flex;gap:4px;align-items:center}
    .sdot{width:7px;height:7px;border-radius:50%;border:1px solid var(--text-dim);background:transparent}
    .sdot.rgb{background:var(--green);border-color:var(--green)}
    .sdot.ir{background:var(--yellow);border-color:var(--yellow)}
    .sdot.radar{background:var(--purple);border-color:var(--purple)}
    .badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;border:1px solid}
    .badge.complete{color:var(--green);border-color:var(--green);background:var(--green-bg)}
    .badge.partial{color:var(--yellow);border-color:var(--yellow);background:var(--yellow-bg)}
    .badge.empty{color:var(--red);border-color:var(--red);background:var(--red-bg)}
    .pager{height:34px;display:flex;align-items:center;justify-content:center;gap:8px;border-top:1px solid var(--border);background:var(--bg-hdr);flex-shrink:0}
    .page-btn{padding:2px 10px;background:transparent;border:1px solid var(--border);border-radius:3px;color:var(--text-sec);font-size:11px;font-family:var(--mono);cursor:pointer}
    .page-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
    .page-btn:disabled{opacity:.35;cursor:default}
    .page-info{font-family:var(--mono);font-size:11px;color:var(--text-sec)}
    .detail-pane{flex:1;display:flex;flex-direction:column;overflow:hidden}
    .detail-header{height:36px;background:var(--bg-hdr);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0}
    .detail-header-title{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim)}
    .detail-capture-id{font-family:var(--mono);font-size:11px;color:var(--text-pri)}
    .detail-chips{display:flex;gap:5px}
    .dchip{padding:1px 7px;border-radius:10px;font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;border:1px solid var(--border);color:var(--text-dim)}
    .dchip.present.rgb{border-color:var(--green);color:var(--green);background:var(--green-bg)}
    .dchip.present.ir{border-color:var(--yellow);color:var(--yellow);background:var(--yellow-bg)}
    .dchip.present.radar{border-color:var(--purple);color:var(--purple);background:var(--purple-bg)}
    /* Label button — sits at right of detail header */
    .label-session-btn{
      margin-left:auto;padding:3px 14px;background:transparent;
      border:1px solid var(--accent);border-radius:3px;
      color:var(--accent);font-size:11px;font-family:var(--mono);font-weight:600;
      cursor:pointer;text-decoration:none;display:none;transition:background .1s;
      letter-spacing:.04em;
    }
    .label-session-btn:hover{background:var(--bg-selected)}
    .label-session-btn.visible{display:inline-block}
    .detail-scroll{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:14px}
    .meta-block{background:var(--bg-panel);border:1px solid var(--border);border-radius:3px}
    .meta-block-hdr{padding:6px 12px;border-bottom:1px solid var(--border-lt);font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim)}
    .meta-grid{padding:8px 12px;display:grid;grid-template-columns:repeat(3,1fr);gap:4px 20px}
    .meta-kv{display:flex;gap:6px;font-size:11px;font-family:var(--mono);padding:1px 0}
    .meta-k{color:var(--text-sec);flex-shrink:0}
    .meta-v{color:var(--text-pri);word-break:break-all}
    .sensor-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
    .sensor-card{background:var(--bg-panel);border:1px solid var(--border);border-radius:3px;display:flex;flex-direction:column;overflow:hidden}
    .sc-hdr{height:28px;display:flex;align-items:center;padding:0 10px;background:var(--bg-hdr);border-bottom:1px solid var(--border);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;gap:6px}
    .sc-hdr.rgb{color:var(--green)}.sc-hdr.ir{color:var(--yellow)}.sc-hdr.radar{color:var(--purple)}
    .sc-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
    .sc-img{background:#0d0d1a;display:flex;align-items:center;justify-content:center;height:140px;overflow:hidden}
    .sc-img img{max-width:100%;max-height:100%;object-fit:contain;cursor:zoom-in}
    .sc-empty{display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--text-dim);font-family:var(--mono);font-size:11px}
    .sc-meta{padding:6px 10px;border-top:1px solid var(--border-lt);overflow-y:auto;max-height:100px}
    .sc-meta .meta-kv{font-size:10px}
    .sc-actions{padding:6px 10px;border-top:1px solid var(--border-lt);display:flex;gap:6px}
    .sc-btn{flex:1;padding:4px 8px;background:transparent;border:1px solid var(--border);border-radius:3px;color:var(--text-sec);font-size:10px;font-family:var(--mono);cursor:pointer;text-align:center;text-decoration:none;transition:border-color .1s,color .1s}
    .sc-btn:hover{border-color:var(--accent);color:var(--accent)}
    .detail-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text-dim);font-family:var(--mono);font-size:12px}
    .detail-empty-icon{font-size:32px}
    .loading-row td{text-align:center;padding:24px;font-family:var(--mono);font-size:11px;color:var(--text-dim)}
    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9999;align-items:center;justify-content:center}
    .modal.open{display:flex}
    .modal img{max-width:92vw;max-height:92vh;object-fit:contain;border-radius:3px}
    .modal-close{position:absolute;top:14px;right:14px;background:var(--bg-panel);border:1px solid var(--border);border-radius:3px;color:var(--text-pri);padding:4px 12px;cursor:pointer;font-size:12px;font-family:var(--mono)}
  </style>
</head>
<body>

<nav>
  <span class="nav-brand">⬡ Frostbyte</span>
  <div class="nav-div"></div>
  <div class="nav-links">
    <a href="/capture"     class="nav-link">Capture</a>
    <a href="/data-viewer" class="nav-link active">Data Viewer</a>
    <a href="/dashboard"   class="nav-link">Debug</a>
  </div>
  <div class="nav-right"><span id="session-count-nav"></span></div>
</nav>

<div class="filter-bar">
  <input type="text" id="search-input" placeholder="search capture id…" oninput="applyFilters()">
  <input type="text" id="device-input" placeholder="device id…" oninput="applyFilters()">
  <div class="filter-sep"></div>
  <select id="status-filter" onchange="applyFilters()">
    <option value="all">All</option>
    <option value="complete">Complete</option>
    <option value="partial">Partial</option>
    <option value="empty">Empty</option>
  </select>
  <div class="filter-sep"></div>
  <button class="btn-sm" onclick="loadSessions()">↻ Refresh</button>
  <span class="count-lbl" id="count-lbl"></span>
</div>

<div class="split">
  <div class="table-pane">
    <div class="table-scroll">
      <table id="session-table">
        <thead>
          <tr>
            <th onclick="sortBy('capture_id')"  id="th-capture_id">Capture ID</th>
            <th onclick="sortBy('device_id')"   id="th-device_id">Device</th>
            <th onclick="sortBy('captured_at')" id="th-captured_at">Time</th>
            <th>Sensors</th>
            <th onclick="sortBy('is_complete')" id="th-is_complete">Status</th>
          </tr>
        </thead>
        <tbody id="session-tbody">
          <tr class="loading-row"><td colspan="5">loading sessions…</td></tr>
        </tbody>
      </table>
    </div>
    <div class="pager">
      <button class="page-btn" id="btn-prev" onclick="prevPage()" disabled>← prev</button>
      <span class="page-info" id="page-info"></span>
      <button class="page-btn" id="btn-next" onclick="nextPage()" disabled>next →</button>
    </div>
  </div>

  <div class="detail-pane" id="detail-pane">
    <div class="detail-header">
      <span class="detail-header-title">Session Detail</span>
      <span class="detail-capture-id" id="detail-capture-id">—</span>
      <div class="detail-chips">
        <span class="dchip rgb"   id="dchip-rgb">RGB</span>
        <span class="dchip ir"    id="dchip-ir">IR</span>
        <span class="dchip radar" id="dchip-radar">RADAR</span>
      </div>
      <!-- Navigates to /capture?session=<id> — capture page auto-loads session + switches to labeling tab -->
      <a id="label-session-btn" class="label-session-btn" href="#">✏ Label</a>
    </div>
    <div id="detail-content" class="detail-empty">
      <div class="detail-empty-icon">▤</div>
      <span>select a session to view details</span>
    </div>
  </div>
</div>

<div class="modal" id="modal" onclick="closeModal()">
  <button class="modal-close" onclick="closeModal()">✕  close</button>
  <img id="modal-img" src="" alt="">
</div>

<script>
  const PAGE_SIZE = 50;
  let allSessions = [], filtered = [], currentPage = 0;
  let sortCol = 'captured_at', sortDir = 'desc', selectedRow = null;

  window.addEventListener('DOMContentLoaded', loadSessions);

  async function loadSessions() {
    document.getElementById('session-tbody').innerHTML =
      '<tr class="loading-row"><td colspan="5">loading sessions…</td></tr>';
    try {
      const r = await fetch('/api/sessions');
      const d = await r.json();
      allSessions = d.sessions || [];
      applyFilters();
    } catch(e) {
      document.getElementById('session-tbody').innerHTML =
        '<tr class="loading-row"><td colspan="5">failed to load — check console</td></tr>';
      console.error(e);
    }
  }

  function applyFilters() {
    const search = document.getElementById('search-input').value.toLowerCase();
    const device = document.getElementById('device-input').value.toLowerCase();
    const status = document.getElementById('status-filter').value;
    filtered = allSessions.filter(s => {
      if (search && !s.capture_id.toLowerCase().includes(search)) return false;
      if (device && !s.device_id.toLowerCase().includes(device))  return false;
      if (status === 'complete' && !s.is_complete) return false;
      if (status === 'partial'  && !(s.sensor_count > 0 && !s.is_complete)) return false;
      if (status === 'empty'    && s.sensor_count !== 0) return false;
      return true;
    });
    doSort(); currentPage = 0; renderTable();
  }

  function sortBy(col) {
    sortDir = (sortCol === col && sortDir === 'asc') ? 'desc' : (col === 'captured_at' ? 'desc' : 'asc');
    sortCol = col; doSort(); renderTable();
  }

  function doSort() {
    const dir = sortDir === 'asc' ? 1 : -1;
    filtered.sort((a, b) => {
      let va = a[sortCol] ?? '', vb = b[sortCol] ?? '';
      if (typeof va === 'boolean') va = va ? 1 : 0;
      if (typeof vb === 'boolean') vb = vb ? 1 : 0;
      return va < vb ? -dir : va > vb ? dir : 0;
    });
  }

  function renderTable() {
    const total = filtered.length;
    const pages = Math.max(1, Math.ceil(total / PAGE_SIZE));
    if (currentPage >= pages) currentPage = pages - 1;
    const start = currentPage * PAGE_SIZE;
    const page  = filtered.slice(start, start + PAGE_SIZE);

    ['capture_id','device_id','captured_at','is_complete'].forEach(col => {
      const th = document.getElementById(`th-${col}`);
      if (th) th.className = sortCol === col ? `sort-${sortDir}` : '';
    });
    document.getElementById('count-lbl').textContent = `${total} session${total !== 1 ? 's' : ''}`;
    document.getElementById('session-count-nav').textContent = total ? `${total} sessions` : '';
    document.getElementById('page-info').textContent = total ? `${currentPage+1} / ${pages}` : '—';
    document.getElementById('btn-prev').disabled = currentPage === 0;
    document.getElementById('btn-next').disabled = currentPage >= pages - 1;

    if (!page.length) {
      document.getElementById('session-tbody').innerHTML =
        '<tr class="loading-row"><td colspan="5">no sessions match filters</td></tr>';
      return;
    }
    document.getElementById('session-tbody').innerHTML = page.map(s => {
      const isSelected = selectedRow === s.session_id;
      const badge    = s.is_complete ? 'complete' : s.sensor_count > 0 ? 'partial' : 'empty';
      const badgeTxt = s.is_complete ? '3/3' : s.sensor_count > 0 ? `${s.sensor_count}/${s.expected_count}` : '0';
      const cs = s.captured_sensors || [];
      return `<tr onclick="selectSession('${s.session_id}',this)" ${isSelected ? 'class="selected"' : ''}>
        <td class="td-id" title="${s.capture_id}">${s.capture_id.substring(0,20)}…</td>
        <td class="td-device">${s.device_id}</td>
        <td class="td-time">${formatShort(s.captured_at)}</td>
        <td><div class="sensor-dots">
          <div class="sdot ${cs.includes('rgb')   ? 'rgb'   : ''}"></div>
          <div class="sdot ${cs.includes('ir')    ? 'ir'    : ''}"></div>
          <div class="sdot ${cs.includes('radar') ? 'radar' : ''}"></div>
        </div></td>
        <td><span class="badge ${badge}">${badgeTxt}</span></td>
      </tr>`;
    }).join('');
  }

  function prevPage() { currentPage--; renderTable(); }
  function nextPage() { currentPage++; renderTable(); }

  async function selectSession(sessionId, row) {
    document.querySelectorAll('#session-tbody tr').forEach(r => r.classList.remove('selected'));
    row.classList.add('selected');
    selectedRow = sessionId;
    document.getElementById('detail-capture-id').textContent = 'loading…';
    document.getElementById('detail-content').innerHTML = '';
    document.getElementById('detail-content').className = '';
    document.getElementById('label-session-btn').classList.remove('visible');

    try {
      const r = await fetch(`/api/sessions/${sessionId}`);
      const s = await r.json();
      renderDetail(s);
    } catch(e) {
      document.getElementById('detail-content').innerHTML =
        '<div class="detail-empty"><div>failed to load session detail</div></div>';
      console.error(e);
    }
  }

  function renderDetail(session) {
    document.getElementById('detail-capture-id').textContent = session.capture_id;
    ['rgb','ir','radar'].forEach(t => {
      const chip = document.getElementById(`dchip-${t}`);
      chip.className = `dchip ${t} ${session.sensors.some(s => s.sensor_type === t) ? 'present' : ''}`;
    });

    // Wire the Label button — opens /capture?session=<id>
    // capture page reads this param on load and switches straight to the labeling tab
    const labelBtn = document.getElementById('label-session-btn');
    labelBtn.href  = `/capture?session=${session.session_id}`;
    labelBtn.classList.add('visible');

    const badge = session.is_complete ? 'complete' : session.sensor_count > 0 ? 'partial' : 'empty';
    const metaHtml = `
      <div class="meta-block">
        <div class="meta-block-hdr">Session</div>
        <div class="meta-grid">
          <div class="meta-kv"><span class="meta-k">capture_id</span><span class="meta-v">${session.capture_id}</span></div>
          <div class="meta-kv"><span class="meta-k">device_id</span><span class="meta-v">${session.device_id}</span></div>
          <div class="meta-kv"><span class="meta-k">captured_at</span><span class="meta-v">${formatEST(session.captured_at)}</span></div>
          <div class="meta-kv"><span class="meta-k">session_id</span><span class="meta-v">${session.session_id}</span></div>
          <div class="meta-kv"><span class="meta-k">sensors</span><span class="meta-v">${session.sensor_count}/${session.expected_count}</span></div>
          <div class="meta-kv"><span class="meta-k">status</span><span class="meta-v"><span class="badge ${badge}">${badge}</span></span></div>
        </div>
      </div>`;

    const sensorCards = ['rgb','ir','radar'].map(t =>
      renderSensorCard(t, session.sensors.find(s => s.sensor_type === t))
    ).join('');

    const content = document.getElementById('detail-content');
    content.className = 'detail-scroll';
    content.innerHTML = metaHtml + `<div class="sensor-grid">${sensorCards}</div>`;
    document.querySelectorAll('canvas[data-s3]').forEach(c => drawRadarHeatmap(c, c.dataset.s3));
  }

  function renderSensorCard(type, data) {
    const names = { rgb:'RGB Camera', ir:'Thermal IR', radar:'mmWave Radar' };
    if (!data) return `
      <div class="sensor-card">
        <div class="sc-hdr ${type}"><span class="sc-dot"></span>${names[type]}</div>
        <div class="sc-img"><div class="sc-empty"><span>[ ]</span><span>no data</span></div></div>
      </div>`;
    const imgSrc  = `/api/images/${data.s3_path}`;
    const imgHtml = type === 'radar'
      ? `<canvas id="rc-radar" data-s3="${data.s3_path}" width="300" height="300" style="max-width:100%;max-height:100%;cursor:zoom-in" onclick="openCanvasModal('rc-radar')"></canvas>`
      : `<img src="${imgSrc}" alt="${type}" onclick="openModal('${imgSrc}')">`;
    const skip = new Set(['capture_id','sensor_type']);
    const metaRows = data.metadata
      ? Object.entries(data.metadata).filter(([k])=>!skip.has(k)).slice(0,8)
          .map(([k,v])=>`<div class="meta-kv"><span class="meta-k">${k}</span><span class="meta-v">${fmtVal(v)}</span></div>`).join('')
      : '';
    return `
      <div class="sensor-card">
        <div class="sc-hdr ${type}"><span class="sc-dot"></span>${names[type]}</div>
        <div class="sc-img">${imgHtml}</div>
        ${metaRows ? `<div class="sc-meta">${metaRows}</div>` : ''}
        <div class="sc-actions">
          <a href="${imgSrc}" download class="sc-btn">${type==='radar'?'↓ json':'↓ download'}</a>
        </div>
      </div>`;
  }

  function formatEST(ts) {
    if (!ts) return '—';
    return new Date(ts).toLocaleString('en-US',{timeZone:'America/New_York',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true});
  }
  function formatShort(ts) {
    if (!ts) return '—';
    return new Date(ts).toLocaleString('en-US',{timeZone:'America/New_York',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false});
  }
  function fmtVal(v) {
    if (v===null||v===undefined) return '—';
    if (typeof v==='object') return JSON.stringify(v);
    return String(v);
  }
  function openModal(src) { document.getElementById('modal-img').src=src; document.getElementById('modal').classList.add('open'); }
  function openCanvasModal(id) { const c=document.getElementById(id); if(c) openModal(c.toDataURL('image/png')); }
  function closeModal() { document.getElementById('modal').classList.remove('open'); }
  document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

  /* ── RADAR ─────────────────────────────────────────── */
  const RP={TX:2,RX:4,BINS:256,ABINS:64,RES:0.04360212053571429};
  function fftInPlace(re,im){const N=re.length;for(let i=1,j=0;i<N;i++){let bit=N>>1;for(;j&bit;bit>>=1)j^=bit;j^=bit;if(i<j){[re[i],re[j]]=[re[j],re[i]];[im[i],im[j]]=[im[j],im[i]]}}for(let len=2;len<=N;len<<=1){const ang=-2*Math.PI/len,wRe=Math.cos(ang),wIm=Math.sin(ang);for(let i=0;i<N;i+=len){let cRe=1,cIm=0;const half=len>>1;for(let j=0;j<half;j++){const uRe=re[i+j],uIm=im[i+j],vRe=re[i+j+half]*cRe-im[i+j+half]*cIm,vIm=re[i+j+half]*cIm+im[i+j+half]*cRe;re[i+j]=uRe+vRe;im[i+j]=uIm+vIm;re[i+j+half]=uRe-vRe;im[i+j+half]=uIm-vIm;const nr=cRe*wRe-cIm*wIm;cIm=cRe*wIm+cIm*wRe;cRe=nr}}}}
  function jetColor(v){v=Math.max(0,Math.min(1,v));return[Math.min(1,Math.max(0,1.5-Math.abs(4*v-3)))*255|0,Math.min(1,Math.max(0,1.5-Math.abs(4*v-2)))*255|0,Math.min(1,Math.max(0,1.5-Math.abs(4*v-1)))*255|0]}
  async function drawRadarHeatmap(canvas,s3Path){try{const resp=await fetch(`/api/images/${s3Path}`);const data=await resp.json();const raw=data.azimuth_static;const{TX,RX,BINS,ABINS,RES}=RP;const VA=TX*RX,mag=new Float32Array(BINS*ABINS),re=new Float64Array(ABINS),im=new Float64Array(ABINS),half=ABINS>>1;for(let r=0;r<BINS;r++){re.fill(0);im.fill(0);for(let v=0;v<VA;v++){const idx=(r*VA+v)*2;re[v]=raw[idx];im[v]=raw[idx+1]}fftInPlace(re,im);for(let k=0;k<half;k++){let t=re[k];re[k]=re[k+half];re[k+half]=t;t=im[k];im[k]=im[k+half];im[k+half]=t}for(let k=0;k<ABINS;k++)mag[r*ABINS+k]=Math.sqrt(re[k]*re[k]+im[k]*im[k])}let maxMag=0;for(let i=0;i<mag.length;i++)if(mag[i]>maxMag)maxMag=mag[i];if(!maxMag)maxMag=1;const W=canvas.width,H=canvas.height,ctx=canvas.getContext('2d'),imgData=ctx.createImageData(W,H),px=imgData.data,rangeDepth=BINS*RES,rangeWidth=rangeDepth/2,BG=[13,13,26];for(let py=0;py<H;py++)for(let px2=0;px2<W;px2++){const x=(px2/(W-1))*2*rangeWidth-rangeWidth,y=(1-py/(H-1))*rangeDepth,rng=Math.sqrt(x*x+y*y),theta=Math.atan2(x,y),i4=(py*W+px2)*4;if(y<0||rng>rangeDepth||theta<-Math.PI/2||theta>Math.PI/2){px[i4]=BG[0];px[i4+1]=BG[1];px[i4+2]=BG[2];px[i4+3]=255;continue}const rBin=Math.min(BINS-1,rng/RES|0),aBin=Math.min(ABINS-1,(theta+Math.PI/2)/Math.PI*ABINS|0);const[cr,cg,cb]=jetColor(mag[rBin*ABINS+aBin]/maxMag);px[i4]=cr;px[i4+1]=cg;px[i4+2]=cb;px[i4+3]=255}ctx.putImageData(imgData,0,0)}catch(e){console.error('Radar render error:',e)}}
